version: 2.1
jobs:
  test-amd64:
    machine:
      image: ubuntu-2004:202201-02
    resource_class: medium
    steps:
      - checkout
      - deploy:
          name: "Install Python and dependencies"
          command: |
            sudo apt-get update && sudo apt-get install -y python3 python3-pip python3-venv
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -e ".[dev]"
      - deploy:
          name: "Run tests in amd64 machine"
          command: |
            . venv/bin/activate
            make test
            make lint

  test-arm64:
    machine:
      image: ubuntu-2004:202201-02
    resource_class: arm.medium
    steps:
      - checkout
      - deploy:
          name: "Install Python and dependencies"
          command: |
            sudo apt-get update && sudo apt-get install -y python3 python3-pip python3-venv
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -e ".[dev]"
      - deploy:
          name: "Run tests in arm64 machine"
          command: |
            . venv/bin/activate
            make test
            make lint

  push-amd64:
    machine:
      image: ubuntu-2004:202201-02
    resource_class: medium
    steps:
      - checkout
      - deploy:
          name: "Upload amd64 image to registry"
          command: |
            export VERSION="${CIRCLE_TAG}-amd64"
            docker build -t pablogcaldito/ipwarn:"${VERSION}" .
            echo "${DOCKERHUB_PASSWORD}" | docker login -u pablogcaldito --password-stdin
            docker push pablogcaldito/ipwarn:"${VERSION}"
            docker tag pablogcaldito/ipwarn:"${VERSION}" pablogcaldito/ipwarn:latest-amd64
            docker push pablogcaldito/ipwarn:latest-amd64

  push-arm64:
    machine:
      image: ubuntu-2004:202201-02
    resource_class: arm.medium
    steps:
      - checkout
      - deploy:
          name: "Upload arm64 image to registry"
          command: |
            export VERSION="${CIRCLE_TAG}-arm64"
            docker build -t pablogcaldito/ipwarn:"${VERSION}" .
            echo "${DOCKERHUB_PASSWORD}" | docker login -u pablogcaldito --password-stdin
            docker push pablogcaldito/ipwarn:"${VERSION}"
            docker tag pablogcaldito/ipwarn:"${VERSION}" pablogcaldito/ipwarn:latest-arm64
            docker push pablogcaldito/ipwarn:latest-arm64

workflows:
  test:
    jobs:
      - test-amd64
      - test-arm64
  push:
    jobs:
      - test-amd64:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - test-arm64:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - push-amd64:
          context:
            - docker
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
          requires:
            - test-amd64
            - test-arm64
      - push-arm64:
          context:
            - docker
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
          requires:
            - test-amd64
            - test-arm64
